# P4 Broker config for the aaa-build-engineering sandbox.
#
# The broker sits in front of the real p4d on :1666 and presents itself
# on :1667. From a client's perspective talking to :1667 is *almost*
# identical to talking to the real server — except this layer enforces
# studio policy that the server alone cannot cleanly express.
#
# Two demo policies are configured below:
#
#   1. block `p4 obliterate` entirely — obliterate permanently deletes
#      file history and is a classic source of "wait, where did that file
#      go" incidents. Real shops route obliterate through an approval
#      workflow; the broker enforces the "no direct obliterates" half.
#
#   2. block `p4 submit` during code-freeze, *except* for an allowlist of
#      service accounts — simulates the broker as the policy layer that
#      encodes operational windows ("nightly build from 2am-4am: read-only",
#      "release week: only build-bot submits to //game/release-*/"). The
#      allowlist lets automation keep submitting through the broker (so those
#      submits stay in the audit log) while humans are frozen out. The freeze
#      is toggled with a single comment on this file + a `p4broker.exe -c
#      <conf>` reload.

target      = localhost:1666;
listen      = 1667;
directory   = C:/PerforceSandbox/broker;
logfile     = broker.log;
debug-level = server=2;
admin-name  = "build-engineering sandbox";
admin-email = "james@example.invalid";
admin-phone = "x911";

compress    = false;
redirection = selective;


#-------------------------------------------------------------------------------
# Policy 1 — hard-block destructive operations.
#-------------------------------------------------------------------------------

command: ^obliterate$
{
    action  = reject;
    message = "p4 obliterate is broker-blocked in this environment. File a Helix Ticket if you genuinely need history rewritten. Direct obliterates have caused 3 production incidents in the last 18 months.";
}

#-------------------------------------------------------------------------------
# Policy 2 — code freeze WITH a service-account allowlist.
#
# Broker command handlers are first-match-wins, so the allowlist PASS rule
# is placed *before* the blanket reject. Automation identities (the CI build
# agent + infra service accounts) may submit during the freeze so the
# build/release pipeline keeps moving; every other user is rejected.
#
# Why this matters (closes ci/lessons-learned.md #3 — "broker is a router,
# not a journal"): before this rule, the freeze blocked *everyone*, so the
# only way to land an infrastructure submit during a freeze was to bypass
# the broker entirely (connect to p4d directly on :1666). A bypassed submit
# succeeds at the depot but never appears in broker.log — the audit signal
# the broker exists to capture is silently lost. With the allowlist, infra
# submits are PASSed *through* the broker: allowed AND logged. The exemption
# now lives in policy, not in an operator's memory of when to bypass.
#
# The user pattern is anchored (^...$) for the same reason the command
# pattern is: an unanchored `build` would also match `build-svc-test`, a
# bare `infra` would match `infra-admin`, etc.
#-------------------------------------------------------------------------------

command: ^submit$
{
    user    = ^(buildagent|build-svc|infra-svc)$;
    action  = pass;
}

command: ^submit$
{
    action  = reject;
    message = "Code freeze active through 2026-05-20 18:00 PT. Submits are blocked except for allowlisted service accounts (buildagent, build-svc, infra-svc). Build/release automation continues under those identities; for emergency exceptions ping #releng-oncall.";
}


# --- Notes for the next operator ---
#
# Reload after editing:    p4broker -c p4broker.conf
# (the broker rereads config on a fresh start; there is no SIGHUP reload).
#
# To temporarily disable a policy: comment out its `command:` block and
# restart the broker. Production shops gate this via a separate
# `policies.d/` directory of include files; this sandbox keeps it inline
# for clarity.
